<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Ones Who Find the Truth</title>
  <style>
    body {
      background-color: #000;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      cursor: pointer; /* indicates user should click */
    }
    h1 {
      font-size: 2em;
      margin-bottom: 1em;
    }
    p {
      font-size: 1.2em;
      max-width: 600px;
      line-height: 1.5em;
      margin: 0.5em 0;
    }
    .glitch {
      color: #ff00ff;
      animation: flicker 1.5s infinite alternate;
    }
    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.5; transform: translateX(2px); }
      100% { opacity: 1; transform: translateX(-2px); }
    }
    img {
      max-width: 400px;
      margin: 1em 0;
    }
    .hint {
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>

  <!-- Background music, initially paused -->
  <audio id="bgm" loop>
    <source src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/flashback.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <!-- Landing text -->
  <h1>The Ones Who Find the Truth</h1>
  <p class="glitch">the ones who find the truth will end up blind someday</p>
  <p>Welcome… you’re already too far in</p>
  <p class="glitch">Look carefully. The answers are hidden in plain sight.</p>
  <p class="hint">Click anywhere to start the experience.</p>

  <!-- Hidden images as clues -->
  <img src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/frame001.jpg" id="clue1" style="display:none;">
  <img src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/frame002.jpg" id="clue2" style="display:none;">
  <img src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/frame003.jpg" id="clue3" style="display:none;">

  <!-- Reveal images and start audio on first click -->
  <script>
    document.body.addEventListener('click', function() {
      const audio = document.getElementById('bgm');
      audio.play(); // play audio after click

      // reveal images gradually
      setTimeout(() => { document.getElementById('clue1').style.display = 'block'; }, 4000);
      setTimeout(() => { document.getElementById('clue2').style.display = 'block'; }, 8000);
      setTimeout(() => { document.getElementById('clue3').style.display = 'block'; }, 12000);

      // remove the hint text
      document.querySelector('.hint').style.display = 'none';
    }, { once: true }); // only trigger once
  </script>

  <!-- Hidden hints in HTML comments -->
  <!-- Each image contains a subtle clue. Inspect carefully for the next step. -->
  <!-- Forest → Haunted House → Apartment side. Letters in order form the next key. -->

</body>
</html>
