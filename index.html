<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Ones Who Find the Truth</title>
  <style>
    body {
      background-color: #000;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      cursor: pointer; /* encourages user click */
    }
    h1 {
      font-size: 2em;
      margin-bottom: 1em;
    }
    p {
      font-size: 1.2em;
      max-width: 600px;
      line-height: 1.5em;
      margin: 0.5em 0;
    }
    .glitch {
      color: #ff00ff;
      animation: flicker 1.5s infinite alternate;
    }
    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.5; transform: translateX(2px); }
      100% { opacity: 1; transform: translateX(-2px); }
    }
    .image-container {
      position: relative;
      display: inline-block;
      margin: 1em 0;
    }
    .hidden-letter {
      position: absolute;
      color: #ff00ff;
      font-size: 32px;
      opacity: 0.3;
      font-weight: bold;
      user-select: none;
    }
    .hint {
      font-size: 0.9em;
      color: #888;
    }
    img {
      max-width: 400px;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Background music -->
  <audio id="bgm" loop>
    <source src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/flashback.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <!-- Landing text -->
  <h1>The Ones Who Find the Truth</h1>
  <p class="glitch">the ones who find the truth will end up blind someday</p>
  <p>Welcome… you’re already too far in</p>
  <p class="glitch">Look carefully. The answers are hidden in plain sight.</p>
  <p class="hint">Click anywhere to start the experience.</p>

  <!-- Images with hidden letters spelling "darkpath" -->
  <div class="image-container" id="clue1" style="display:none;">
    <img src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/frame001.jpg">
    <span class="hidden-letter" style="top: 15%; left: 20%;">d</span>
  </div>

  <div class="image-container" id="clue2" style="display:none;">
    <img src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/frame002.jpg">
    <span class="hidden-letter" style="top: 10%; left: 25%;">a</span>
  </div>

  <div class="image-container" id="clue3" style="display:none;">
    <img src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/frame003.jpg">
    <span class="hidden-letter" style="top: 20%; left: 30%;">r</span>
    <span class="hidden-letter" style="top: 35%; left: 35%;">k</span>
    <span class="hidden-letter" style="top: 50%; left: 40%;">p</span>
    <span class="hidden-letter" style="top: 65%; left: 45%;">a</span>
    <span class="hidden-letter" style="top: 75%; left: 50%;">t</span>
    <span class="hidden-letter" style="top: 85%; left: 55%;">h</span>
  </div>

  <!-- Reveal images and start audio on first click -->
  <script>
    document.body.addEventListener('click', function() {
      const audio = document.getElementById('bgm');
      audio.play(); // play audio after click

      // reveal images gradually
      setTimeout(() => { document.getElementById('clue1').style.display = 'block'; }, 4000);
      setTimeout(() => { document.getElementById('clue2').style.display = 'block'; }, 8000);
      setTimeout(() => { document.getElementById('clue3').style.display = 'block'; }, 12000);

      // remove the hint text
      document.querySelector('.hint').style.display = 'none';
    }, { once: true }); // only trigger once
  </script>

  <!-- Hidden hints in HTML comments -->
  <!-- Players must collect letters from images to spell "darkpath" -->
  <!-- Then they can go to the next GitHub repo: https://github.com/ponsukeseal/darkpath -->

</body>
</html>
