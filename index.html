<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Ones Who Find the Truth</title>
  <style>
    body {
      background-color: #000;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      cursor: pointer;
    }
    h1 { font-size: 2em; margin-bottom: 1em; }
    p { font-size: 1.2em; max-width: 600px; line-height: 1.5em; margin: 0.5em 0; }
    .glitch { color: #ff00ff; animation: flicker 1.5s infinite alternate; }
    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.5; transform: translateX(2px); }
      100% { opacity: 1; transform: translateX(-2px); }
    }

    .image-container { position: relative; display: inline-block; margin: 1em 0; }
    .hidden-letter {
      position: absolute;
      font-size: 32px;
      font-weight: bold;
      user-select: none;
      opacity: 0.12; /* subtle transparency */
    }
    .hint { font-size: 0.9em; color: #888; }
    img { max-width: 400px; display: block; }
  </style>
</head>
<body>

  <!-- Background music -->
  <audio id="bgm" loop>
    <source src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/flashback.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <!-- Landing text -->
  <h1>The Ones Who Find the Truth</h1>
  <p class="glitch">the ones who find the truth will end up blind someday</p>
  <p>Welcome… you’re already too far in</p>
  <p class="glitch">Look carefully. The answers are hidden in plain sight.</p>
  <p class="hint">Click anywhere to start the experience.</p>

  <!-- Images with blended letters spelling "darkpath" scrambled -->
  <div class="image-container" id="clue1" style="display:none;">
    <img src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/frame001.jpg">
    <span class="hidden-letter" style="top: 12%; left: 18%; color: rgba(45,60,30,0.12);">d</span>
    <span class="hidden-letter" style="top: 50%; left: 70%; color: rgba(50,70,40,0.12);">a</span>
  </div>

  <div class="image-container" id="clue2" style="display:none;">
    <img src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/frame002.jpg">
    <span class="hidden-letter" style="top: 15%; left: 25%; color: rgba(40,60,35,0.12);">r</span>
    <span class="hidden-letter" style="top: 55%; left: 40%; color: rgba(50,70,40,0.12);">k</span>
    <span class="hidden-letter" style="top: 75%; left: 55%; color: rgba(45,65,38,0.12);">p</span>
  </div>

  <div class="image-container" id="clue3" style="display:none;">
    <img src="https://raw.githubusercontent.com/ponsukeseal/blindsomeday/main/frame003.jpg">
    <span class="hidden-letter" style="top: 25%; left: 20%; color: rgba(40,40,40,0.12);">a</span>
    <span class="hidden-letter" style="top: 50%; left: 35%; color: rgba(50,50,50,0.12);">t</span>
    <span class="hidden-letter" style="top: 80%; left: 50%; color: rgba(55,55,55,0.12);">h</span>
  </div>

  <!-- Reveal images and start audio on first click -->
  <script>
    document.body.addEventListener('click', function() {
      const audio = document.getElementById('bgm');
      audio.play();

      // reveal images gradually
      setTimeout(() => { document.getElementById('clue1').style.display = 'block'; }, 4000);
      setTimeout(() => { document.getElementById('clue2').style.display = 'block'; }, 8000);
      setTimeout(() => { document.getElementById('clue3').style.display = 'block'; }, 12000);

      // remove the hint text
      document.querySelector('.hint').style.display = 'none';
    }, { once: true });
  </script>

  <!-- Hidden hints in HTML comments -->
  <!-- Letters from images spell "darkpath" -->
  <!-- Next step: https://github.com/ponsukeseal/darkpath -->

</body>
</html>
